<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi-On War Room v21 | V-World 자동분석</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_JS_KEY&libraries=services"></script>

<style>
body {margin:0;font-family:sans-serif;background:#0b0f1a;color:#fff;}
#map {width:100%;height:100vh;}
#panel {
  position:absolute;right:0;top:0;width:360px;height:100%;
  background:#111;padding:12px;overflow:auto;
}
.sec {margin-bottom:12px;padding:10px;background:#1b2333;border-radius:8px;}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <div class="sec">
    <div>지번: <span id="addr">-</span></div>
    <div>PNU: <span id="pnu">-</span></div>
  </div>

  <div class="sec">
    <div>대지면적: <span id="v-area">-</span></div>
    <div>공시지가: <span id="v-price">-</span></div>
    <div>토지가격: <span id="v-total">-</span></div>
  </div>

  <div class="sec">
    <div id="dev">개발 분석 대기</div>
  </div>
</div>

<script>

// ===== CONFIG =====
const CFG = {
  kakao: "YOUR_KAKAO_JS_KEY",
  public: "YOUR_PUBLIC_API_KEY",
  vworld: "D908CE2F-5A9B-3B2F-BF3D-ABC7D1DC40B8"
};

// ===== 상태 =====
const ST = {
  lat:0,lng:0,pnu:'',area:0,price:0,jibun:''
};

let map;

// ===== 초기화 =====
window.onload = () => {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center:new kakao.maps.LatLng(37.5665,126.9780),
    level:3
  });

  kakao.maps.event.addListener(map,'click', e=>{
    onMapClick(e.latLng.getLat(), e.latLng.getLng());
  });
};

// ===== 클릭 =====
async function onMapClick(lat, lng){

  ST.lat = lat;
  ST.lng = lng;

  // 🔥 핵심 (1초)
  await fetchVWorld(lat, lng);

  // 추가 데이터
  await fetchLandPrice();

  renderUI();
}

// ===== V-World =====
async function fetchVWorld(lat, lng){

  const url = `https://api.vworld.kr/req/data
  ?service=data
  &request=GetFeature
  &data=LP_PA_CBND_BUBUN
  &key=${CFG.vworld}
  &geomFilter=POINT(${lng} ${lat})
  &geometry=false
  &size=1`;

  try{
    const res = await fetch(url);
    const json = await res.json();

    const feature = json?.response?.result?.featureCollection?.features?.[0];

    if(!feature){
      console.warn("데이터 없음");
      return;
    }

    const prop = feature.properties;

    ST.pnu   = prop.pnu;
    ST.area  = parseFloat(prop.area);
    ST.jibun = prop.jibun;

    console.log("VWorld:", prop);

  }catch(e){
    console.error("VWorld 실패", e);
  }
}

// ===== 공시지가 =====
async function fetchLandPrice(){

  if(!ST.pnu) return;

  const url = `https://apis.data.go.kr/1613000/LandPriceService/getLandPriceInfo
  ?serviceKey=${CFG.public}
  &pnu=${ST.pnu}
  &_type=json`;

  try{
    const res = await fetch(url);
    const data = await res.json();

    let item = data?.response?.body?.items?.item;
    if(Array.isArray(item)) item = item[0];

    if(item){
      ST.price = parseFloat(item.pblntfPclnd);
    }

  }catch(e){
    console.error("지가 실패");
  }
}

// ===== UI =====
function renderUI(){

  document.getElementById('addr').innerText = ST.jibun || "-";
  document.getElementById('pnu').innerText = ST.pnu || "-";

  document.getElementById('v-area').innerText =
    ST.area ? ST.area.toLocaleString()+"㎡":"-";

  document.getElementById('v-price').innerText =
    ST.price ? ST.price.toLocaleString()+"원/㎡":"-";

  const total = ST.area * ST.price;

  document.getElementById('v-total').innerText =
    total ? (total/100000000).toFixed(1)+"억":"-";

  renderDev();
}

// ===== 개발 분석 =====
function renderDev(){

  if(!ST.area){
    document.getElementById('dev').innerText = "데이터 없음";
    return;
  }

  const gfa = ST.area * 2; // 용적률 가정
  const units = Math.floor(gfa / 30);

  document.getElementById('dev').innerHTML =
    `개발가능 연면적: ${gfa.toLocaleString()}㎡<br>
     예상 세대수: ${units}세대`;
}

</script>

</body>
</html>
